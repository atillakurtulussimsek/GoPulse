{{define "dashboard"}}
<header class="mb-8 flex items-center justify-between">
    <div>
        <h1 class="text-2xl font-bold tracking-tight text-sky-400">GoPulse</h1>
        <p class="text-sm text-slate-500">Minimalist uptime izleme paneli</p>
    </div>
    <div class="flex items-center gap-3">
        <span class="inline-flex items-center gap-2 rounded-full bg-slate-800/60 px-3 py-1 text-xs text-slate-400">
            <span class="h-2 w-2 animate-pulse rounded-full bg-emerald-400"></span>
            canlı
        </span>
        <form method="post" action="/logout">
            <button type="submit"
                    class="rounded-lg border border-slate-700 px-3 py-1 text-xs text-slate-300 transition hover:border-slate-500 hover:text-white">
                Çıkış
            </button>
        </form>
    </div>
</header>

<!-- Yeni monitör ekleme formu -->
<section class="mb-8 rounded-xl border border-slate-800 bg-slate-900/50 p-5">
    <h2 class="mb-4 text-sm font-semibold uppercase tracking-wide text-slate-400">Yeni İzleme Ekle</h2>
    <form hx-post="/monitors" hx-target="#monitor-list" hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful) this.reset()"
          class="grid grid-cols-1 gap-3 sm:grid-cols-12">
        <input name="name" placeholder="Ad (örn. Ana Site)" required
               class="sm:col-span-3 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
        <select name="type"
                class="sm:col-span-2 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 focus:border-sky-500 focus:outline-none">
            <option value="http">HTTP/HTTPS</option>
            <option value="tcp">TCP Port</option>
        </select>
        <input name="target" placeholder="https://ornek.com veya host:port" required
               class="sm:col-span-4 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
        <input name="interval" type="number" min="1" placeholder="sn" title="Kontrol aralığı (saniye)"
               class="sm:col-span-1 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
        <button type="submit"
                class="sm:col-span-2 rounded-lg bg-sky-500 px-3 py-2 text-sm font-semibold text-white transition hover:bg-sky-400">
            Ekle
        </button>
    </form>
</section>

<!-- Monitör listesi (HTMX ile 10 sn'de bir canlı yenilenir) -->
<section id="monitor-list"
         hx-get="/partials/monitors" hx-trigger="every 10s" hx-swap="innerHTML">
    {{template "monitor_table" .}}
</section>
{{end}}
