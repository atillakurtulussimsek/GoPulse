{{define "channel_fields_telegram"}}
<div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
    <input name="token" placeholder="Bot Token" required
           class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
    <input name="chat_id" placeholder="Chat ID" required
           class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
</div>
{{end}}

{{define "channel_fields_smtp"}}
<div class="grid grid-cols-1 gap-3 sm:grid-cols-6">
    <input name="host" placeholder="SMTP Host" required
           class="sm:col-span-3 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
    <input name="port" type="number" placeholder="Port (örn. 587)" required
           class="sm:col-span-1 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
    <input name="from" placeholder="Gönderen (from)" required
           class="sm:col-span-2 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
    <input name="username" placeholder="Kullanıcı adı (opsiyonel)"
           class="sm:col-span-3 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
    <input name="password" type="password" placeholder="Şifre (opsiyonel)"
           class="sm:col-span-3 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
    <input name="to" placeholder="Alıcılar (virgülle ayır)" required
           class="sm:col-span-6 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 placeholder-slate-600 focus:border-sky-500 focus:outline-none">
</div>
{{end}}
