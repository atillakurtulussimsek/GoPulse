{{define "monitor_channels_form"}}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/70 p-4"
     hx-on:click="if(event.target===this) document.getElementById('modal').innerHTML=''">
    <div class="w-full max-w-md rounded-xl border border-slate-800 bg-slate-900 p-6 shadow-xl">
        <h3 class="mb-4 text-sm font-semibold uppercase tracking-wide text-slate-400">Bildirim Kanallarını Seç</h3>
        <form hx-post="/monitors/{{.MonitorID}}/channels" hx-target="#monitor-list" hx-swap="innerHTML">
            {{if not .Channels}}
            <p class="text-sm text-slate-500">Önce bir bildirim kanalı eklemelisin.</p>
            {{else}}
            <div class="space-y-2">
                {{range .Channels}}
                <label class="flex items-center gap-3 rounded-lg border border-slate-800 px-3 py-2 text-sm text-slate-200 hover:border-slate-600">
                    <input type="checkbox" name="channel" value="{{.Channel.ID}}" {{if .Checked}}checked{{end}}
                           class="h-4 w-4 rounded border-slate-600 bg-slate-950 text-sky-500">
                    <span>{{.Channel.Label}}</span>
                    <span class="ml-auto rounded bg-slate-800 px-2 py-0.5 text-xs text-slate-400">{{channelTypeLabel .Channel.Type}}</span>
                </label>
                {{end}}
            </div>
            {{end}}
            <div class="mt-5 flex justify-end gap-2">
                <button type="button" onclick="document.getElementById('modal').innerHTML=''"
                        class="rounded-lg border border-slate-700 px-3 py-2 text-sm text-slate-300 transition hover:border-slate-500 hover:text-white">
                    İptal
                </button>
                <button type="submit"
                        class="rounded-lg bg-sky-500 px-3 py-2 text-sm font-semibold text-white transition hover:bg-sky-400">
                    Kaydet
                </button>
            </div>
        </form>
    </div>
</div>
{{end}}
