{{define "login"}}<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoPulse — Giriş</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="flex h-full items-center justify-center bg-slate-950 text-slate-200 antialiased">
    <div class="w-full max-w-sm px-6">
        <div class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-sky-400">GoPulse</h1>
            <p class="text-sm text-slate-500">Panele giriş yap</p>
        </div>
        <form method="post" action="/login"
              class="space-y-4 rounded-xl border border-slate-800 bg-slate-900/50 p-6">
            {{if .Error}}
            <div class="rounded-lg border border-rose-900/60 bg-rose-500/10 px-3 py-2 text-sm text-rose-400">
                {{.Error}}
            </div>
            {{end}}
            <div>
                <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-400">E-posta</label>
                <input name="email" type="email" required value="{{.Email}}" autofocus
                       class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 focus:border-sky-500 focus:outline-none">
            </div>
            <div>
                <label class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-400">Şifre</label>
                <input name="password" type="password" required
                       class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200 focus:border-sky-500 focus:outline-none">
            </div>
            <button type="submit"
                    class="w-full rounded-lg bg-sky-500 px-3 py-2 text-sm font-semibold text-white transition hover:bg-sky-400">
                Giriş Yap
            </button>
        </form>
    </div>
</body>
</html>{{end}}
